[build]
  command = "node scripts/prepare-netlify.cjs"
  publish = "outputs/zenova-web"

[[headers]]
  for = "/zenova-runtime.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
