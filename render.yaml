services:
  - type: web
    name: zenova-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: GEMINI_TIMEOUT_MS
        value: "10000"
      - key: CORS_ORIGIN
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
